<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <title>Restaurant Menu</title>

  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    #categories {
      text-align: center;
      margin-bottom: 20px;
    }

    .btn {
      padding: 10px 15px;
      margin: 5px;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      background: #ddd;
    }

    .btn.active {
      background: orange;
      color: white;
    }

    #menu {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
    }

    .price {
      color: green;
      font-weight: bold;
    }

    /* toast */
    #toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: black;
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      display: none;
    }

    /* form */
    .input-field {
      width: 100%;
      padding: 12px; /* 🔥 เพิ่มให้ใหญ่ขึ้นตามที่คุณต้องการ */
      margin-bottom: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 16px;
    }
  </style>
</head>

<body>

  <h1>🍽 เมนูอาหาร</h1>

  <div id="categories"></div>

  <div style="text-align:center; margin-bottom:20px;">
    <button onclick="openForm()" class="btn" style="background:green;color:white;">
      ➕ เพิ่มเมนู
    </button>

    <button class="btn" onclick="goToPage('index.html')">
      🏠 กลับหน้าหลัก
    </button>
  </div>

  <!-- TOAST -->
  <div id="toast"></div>

  <!-- FORM POPUP -->
  <div id="formPopup"
    style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5);">
    
    <div style="background:white; padding:20px; width:350px; margin:100px auto; border-radius:10px;">
      <h3>เพิ่มเมนู</h3>

      <input id="name" class="input-field" placeholder="ชื่อเมนู">
      <input id="price" class="input-field" type="number" placeholder="ราคา">

      <select id="category" class="input-field">
        <option value="">-- เลือกหมวดหมู่ --</option>
      </select>

      <button onclick="addMenu()" class="btn" style="background:orange;color:white;">บันทึก</button>
      <button onclick="closeForm()" class="btn">ยกเลิก</button>
    </div>
  </div>

  <div id="menu"></div>

  <script>
    const API_URL = "http://localhost:3000/menu";

    let allData = [];

    async function fetchMenu() {
      const res = await fetch(API_URL);
      const data = await res.json();

      allData = data;

      renderCategories(data);
      renderMenu(data);
    }

    function renderCategories(data) {
      const container = document.getElementById("categories");

      const categories = ["ทั้งหมด", ...new Set(data.map(item => item.category_name))];

      container.innerHTML = "";

      categories.forEach(cat => {
        const btn = document.createElement("button");
        btn.className = "btn";
        btn.innerText = cat;

        btn.onclick = () => {
          document.querySelectorAll("#categories .btn").forEach(b => b.classList.remove("active"));
          btn.classList.add("active");

          if (cat === "ทั้งหมด") {
            renderMenu(allData);
          } else {
            const filtered = allData.filter(item => item.category_name === cat);
            renderMenu(filtered);
          }
        };

        container.appendChild(btn);
      });

      container.firstChild.classList.add("active");
    }

    function renderMenu(data) {
      const menu = document.getElementById("menu");
      menu.innerHTML = "";

      data.forEach(item => {
        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
          <h3>${item.name}</h3>
          <p class="price">฿ ${item.price}</p>
          <small>📦 ${item.category_name}</small>
        `;

        menu.appendChild(card);
      });
    }

    // ---------- FORM ----------
    function openForm() {
      document.getElementById("formPopup").style.display = "block";
      loadCategoriesToDropdown();
    }

    function closeForm() {
      document.getElementById("formPopup").style.display = "none";
    }

    function loadCategoriesToDropdown() {
      const select = document.getElementById("category");

      const categories = [...new Set(allData.map(item => item.category_name))];

      select.innerHTML = `<option value="">-- เลือกหมวดหมู่ --</option>`;

      categories.forEach(cat => {
        const option = document.createElement("option");
        option.value = cat;
        option.text = cat;
        select.appendChild(option);
      });
    }

    function showToast(message, isError = false) {
      const toast = document.getElementById("toast");
      toast.innerText = message;
      toast.style.display = "block";
      toast.style.background = isError ? "red" : "green";

      setTimeout(() => {
        toast.style.display = "none";
      }, 2000);
    }

    async function addMenu() {
      const name = document.getElementById("name").value.trim();
      const price = document.getElementById("price").value;
      const category_name = document.getElementById("category").value;

      if (!name || !price || !category_name) {
        showToast("กรอกข้อมูลให้ครบ!", true);
        return;
      }

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            name,
            price,
            category_name
          })
        });

        if (!res.ok) throw new Error();

        showToast("เพิ่มเมนูสำเร็จ 🎉");

        document.getElementById("name").value = "";
        document.getElementById("price").value = "";
        document.getElementById("category").value = "";

        closeForm();
        fetchMenu();

      } catch (err) {
        showToast("เพิ่มไม่สำเร็จ ❌", true);
      }
    }

    function goToPage(page) {
      window.location.href = page;
    }

    // start
    fetchMenu();
  </script>

</body>
</html>
