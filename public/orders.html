<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <title>Order System</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        .cat-btn {
            padding: 10px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background: #ddd;
        }

        .cat-btn.active {
            background: orange;
            color: white;
        }

        .menu-item,
        .order-item {
            background: white;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        button {
            padding: 5px 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .add {
            background: green;
            color: white;
        }

        .pay {
            background: blue;
            color: white;
            margin: 2px;
        }

        .total {
            font-size: 20px;
            text-align: right;
            margin: 10px 0;
        }

        #confirmBtn {
            background: #28a745;
            color: white;
            padding: 10px 20px;
            font-size: 16px;
        }
    </style>
</head>

<body>

    <h1>🧾 ระบบออเดอร์</h1>
    <button onclick="goToPage('index.html')">🏠 กลับหน้าหลัก</button>

    <div id="summary" style="margin:20px 0; background:white; padding:15px; border-radius:10px;">
        <b>📊 สรุปออเดอร์วันนี้</b><br>
        🧾 ทั้งหมด: <span id="totalOrders">0</span> ออเดอร์ |
        ⏳ รอชำระ: <span id="pendingOrders">0</span> |
        💰 จ่ายแล้ว: <span id="paidOrders">0</span>
    </div>

    <div id="categories"></div>
    <div id="menu"></div>

    <hr>

    <h2>🛒 รายการที่เลือก</h2>
    <div id="cart"></div>
    <div class="total">รวม: <span id="total">0</span> บาท</div>
    <button id="confirmBtn" onclick="confirmOrder()">✅ ยืนยันออเดอร์</button>

    <hr>

    <h2>📋 ออเดอร์ทั้งหมด</h2>
    <div id="orders"></div>

    <script>
        let menuData = [];
        let cart = [];
        let currentCategory = null;

        const API_URL = "https://backend-mahalarb.onrender.com";

        // ================= MENU =================
        async function loadMenu() {
            const res = await fetch(`${API_URL}/menu`);
            menuData = await res.json();

            renderCategories();
            renderMenu();
        }

        // ================= CATEGORY =================
        function renderCategories() {
            // FIX: Use category_name from API instead of hardcoded categoryMap
            const seen = new Map();
            menuData.forEach(m => {
                if (!seen.has(m.category_id)) {
                    seen.set(m.category_id, m.category_name || "อื่นๆ");
                }
            });

            let html = `<button class="cat-btn ${!currentCategory ? 'active' : ''}"
                onclick="selectCategory(null)">ทั้งหมด</button>`;

            seen.forEach((name, id) => {
                html += `<button class="cat-btn ${currentCategory === id ? 'active' : ''}"
                    onclick="selectCategory(${id})">${name}</button>`;
            });

            document.getElementById("categories").innerHTML = html;
        }

        function selectCategory(c) {
            currentCategory = c;
            renderCategories();
            renderMenu();
        }

        // ================= MENU =================
        function renderMenu() {
            let data = currentCategory
                ? menuData.filter(m => m.category_id === currentCategory)
                : menuData;

            let html = "";
            data.forEach(m => {
                html += `
                <div class="menu-item">
                    <span>${m.name} (${m.price}฿)</span>
                    <button class="add" onclick="addToCart(${m.id})">+ เพิ่ม</button>
                </div>`;
            });

            document.getElementById("menu").innerHTML = html || "<p>ไม่มีเมนู</p>";
        }

        // ================= CART =================
        function addToCart(id) {
            const item = menuData.find(m => m.id === id);
            const exist = cart.find(c => c.id === id);

            if (exist) exist.qty++;
            else cart.push({ ...item, qty: 1 });

            renderCart();
        }

        function changeQty(id, delta) {
            const item = cart.find(c => c.id === id);
            if (!item) return;
            item.qty += delta;

            if (item.qty <= 0) {
                cart = cart.filter(c => c.id !== id);
            }

            renderCart();
        }

        function renderCart() {
            let html = "";
            let total = 0;

            cart.forEach(c => {
                total += c.price * c.qty;
                html += `
                <div class="order-item">
                    <div>
                        <b>${c.name}</b><br>
                        <button onclick="changeQty(${c.id}, -1)">−</button>
                        &nbsp;${c.qty}&nbsp;
                        <button onclick="changeQty(${c.id}, 1)">+</button>
                    </div>
                    <div>${(c.price * c.qty).toFixed(2)}฿</div>
                </div>`;
            });

            document.getElementById("cart").innerHTML = html || "<p style='color:#999'>ยังไม่มีรายการ</p>";
            document.getElementById("total").innerText = total.toFixed(2);
        }

        // ================= CREATE ORDER =================
        async function confirmOrder() {
            if (cart.length === 0) return alert("ยังไม่มีรายการ");

            const items = cart.map(c => ({
                menu_id: c.id,
                quantity: c.qty,
                price: c.price
            }));

            const res = await fetch(`${API_URL}/order`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ items })
            });

            const data = await res.json();

            if (!res.ok) return alert("สร้างออเดอร์ไม่สำเร็จ: " + (data.error || ""));

            // FIX: Show order_number (daily number) not internal DB id
            alert("✅ สร้างออเดอร์ #" + (data.order_number ?? data.order_id));

            cart = [];
            renderCart();
            loadOrders();
        }

        // ================= GROUP ORDERS =================
        // FIX: Also capture order_number in the grouped map
        function groupOrders(data) {
            const map = {};

            data.forEach(item => {
                if (!map[item.order_id]) {
                    map[item.order_id] = {
                        id: item.order_id,
                        order_number: item.order_number,   // FIX: was missing
                        items: [],
                        total: 0,
                        status: item.payment_status || "pending"
                    };
                }

                map[item.order_id].items.push({
                    name: item.menu_name,
                    qty: item.quantity
                });

                map[item.order_id].total += item.quantity * item.unit_price;
            });

            return Object.values(map);
        }

        // ================= LOAD ORDERS =================
        // FIX: Only one definition of loadOrders (duplicate removed)
        async function loadOrders() {
            const res = await fetch(`${API_URL}/orders`);
            const data = await res.json();

            const orders = groupOrders(data);

            renderOrders(orders);
            renderSummary(orders);
        }

        // ================= RENDER ORDERS =================
        // FIX: Only one definition of renderOrders (duplicate removed)
        // FIX: Use order_number for display, consistent "success" status check
        function renderOrders(orders) {
            let html = "";

            orders.forEach(o => {
                const isPaid = o.status === "success";
                const statusText = isPaid ? "💰 จ่ายแล้ว" : "⏳ รอชำระ";
                const statusColor = isPaid ? "green" : "orange";

                const itemsHTML = o.items.map(i => `${i.name} x ${i.qty}`).join("<br>");

                html += `
                <div class="order-item">
                    <div>
                        🧾 Order #${o.order_number}<br>
                        ${itemsHTML}<br>
                        รวม ${o.total.toFixed(2)}฿<br>
                        <span style="color:${statusColor}"><b>${statusText}</b></span>
                    </div>
                    <div>
                        ${!isPaid ? `
                            <button class="pay" onclick="pay(${o.id}, 'cash')">💵 เงินสด</button>
                            <button class="pay" onclick="pay(${o.id}, 'qr')">📱 สแกน QR</button>
                        ` : "✅ เสร็จสิ้น"}
                    </div>
                </div>`;
            });

            document.getElementById("orders").innerHTML = html || "<p style='color:#999'>ยังไม่มีออเดอร์วันนี้</p>";
        }

        // ================= SUMMARY =================
        function renderSummary(orders) {
            const total = orders.length;
            const paid = orders.filter(o => o.status === "success").length;
            const pending = total - paid;

            document.getElementById("totalOrders").innerText = total;
            document.getElementById("paidOrders").innerText = paid;
            document.getElementById("pendingOrders").innerText = pending;
        }

        // ================= PAYMENT =================
        async function pay(orderId, method) {
            const res = await fetch(`${API_URL}/pay`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ order_id: orderId, method })
            });

            if (!res.ok) return alert("จ่ายเงินไม่สำเร็จ");

            alert("✅ ชำระเงินสำเร็จ");
            loadOrders();
        }

        function goToPage(page) {
            window.location.href = page;
        }

        // ================= INIT =================
        loadMenu();
        loadOrders();
    </script>

</body>
</html>
