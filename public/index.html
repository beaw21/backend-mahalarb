<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>มหาลาภ · ระบบร้านอาหาร</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Serif+Thai:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #f7f3ee;
      --surface: #ffffff;
      --s2: #fdf9f5;
      --border: #e8dfd5;
      --accent: #c2673a;
      --accent2: #e8906a;
      --green: #3a8a5c;
      --blue: #3a6fa8;
      --text: #2c2118;
      --muted: #8c7b6e;
      --font: 'Noto Serif Thai', serif;
      --mono: 'DM Mono', monospace;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* soft dot pattern */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, var(--border) 1px, transparent 1px);
      background-size: 28px 28px;
      opacity: .5;
      pointer-events: none;
    }

    /* warm glow */
    body::after {
      content: '';
      position: fixed;
      width: 700px;
      height: 500px;
      background: radial-gradient(ellipse, rgba(194, 103, 58, .1) 0%, transparent 70%);
      top: -100px;
      left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 52px 44px 48px;
      width: 420px;
      max-width: 95vw;
      box-shadow: 0 4px 6px rgba(44, 33, 24, .04), 0 20px 60px rgba(44, 33, 24, .1);
      animation: rise .5s cubic-bezier(.16, 1, .3, 1) both;
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(24px) scale(.98);
      }

      to {
        opacity: 1;
        transform: none;
      }
    }

    .brand {
      text-align: center;
      margin-bottom: 40px;
    }

    .brand-emblem {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin: 0 auto 16px;
      box-shadow: 0 8px 24px rgba(194, 103, 58, .3);
    }

    .brand-name {
      font-size: 30px;
      font-weight: 800;
      letter-spacing: -.5px;
      color: var(--text);
    }

    .brand-name em {
      color: var(--accent);
      font-style: normal;
    }

    .brand-sub {
      font-size: 12px;
      color: var(--muted);
      font-family: var(--mono);
      margin-top: 6px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin-bottom: 28px;
      position: relative;
    }

    .divider::after {
      content: '✦';
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      background: var(--surface);
      padding: 0 10px;
      color: var(--border);
      font-size: 10px;
    }

    .nav-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      padding: 15px 18px;
      margin-bottom: 10px;
      background: var(--s2);
      border: 1.5px solid var(--border);
      border-radius: 16px;
      color: var(--text);
      font-family: var(--font);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all .22s ease;
      text-align: left;
      position: relative;
    }

    .nav-btn:last-child {
      margin-bottom: 0;
    }

    .nav-btn:hover {
      border-color: var(--accent);
      background: #fff;
      box-shadow: 0 4px 20px rgba(194, 103, 58, .12);
      transform: translateY(-1px);
    }

    .nav-btn:hover .arrow {
      color: var(--accent);
      transform: translateX(3px);
    }

    .arrow {
      position: absolute;
      right: 18px;
      color: var(--border);
      font-size: 16px;
      transition: all .22s;
    }

    .ico {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .ico-g {
      background: rgba(58, 138, 92, .12);
    }

    .ico-b {
      background: rgba(58, 111, 168, .12);
    }

    .ico-a {
      background: rgba(194, 103, 58, .12);
    }

    .nav-label {
      line-height: 1.3;
    }

    .nav-sub {
      font-size: 12px;
      color: var(--muted);
      font-weight: 400;
      margin-top: 2px;
      font-family: var(--mono);
    }

    .footer {
      position: relative;
      z-index: 1;
      margin-top: 24px;
      font-size: 11px;
      color: var(--muted);
      font-family: var(--mono);
      text-align: center;
      letter-spacing: .8px;
    }
  </style>
</head>

<body>

  <div class="card">
    <div class="brand">
      <div class="brand-emblem">🍽️</div>
      <div class="brand-name">มหา<em>ลาภ</em></div>
      <div class="brand-sub">Restaurant · Backend System</div>
    </div>

    <div class="divider"></div>

    <button class="nav-btn" onclick="go('menu.html')">
      <div class="ico ico-g">📋</div>
      <div class="nav-label">จัดการเมนู <div class="nav-sub">เพิ่ม / แก้ไข / ลบรายการอาหาร</div>
      </div>
      <span class="arrow">→</span>
    </button>

    <button class="nav-btn" onclick="go('orders.html')">
      <div class="ico ico-b">🧾</div>
      <div class="nav-label">จัดการออเดอร์ <div class="nav-sub">รับออเดอร์และชำระเงิน</div>
      </div>
      <span class="arrow">→</span>
    </button>

    <button class="nav-btn" onclick="go('dashboard.html')">
      <div class="ico ico-a">📊</div>
      <div class="nav-label">ภาพรวมร้าน <div class="nav-sub">ยอดขาย รายวัน / สัปดาห์ / เดือน</div>
      </div>
      <span class="arrow">→</span>
    </button>
  </div>

  <div class="footer">v 1.0 · MAHALARB SYSTEM</div>
  <script>function go(p) { window.location.href = p }</script>
</body>

</html>
